<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>恋爱脑测试 - 开始测试</title>
  <link rel="stylesheet" href="src/styles/main.css">
</head>
<body>
  <div class="test-container">
    <!-- 加载状态 -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-spinner"></div>
      <p class="loading-text">正在验证...</p>
    </div>

    <!-- 错误状态 -->
    <div id="error-screen" class="error-screen" style="display: none;">
      <div class="error-icon">⚠️</div>
      <h2 class="error-title">访问受限</h2>
      <p id="error-message" class="error-message"></p>
    </div>

    <!-- 测试主体 -->
    <div id="test-screen" class="test-screen" style="display: none;">
      <header class="test-header">
        <div class="progress-container">
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
          </div>
          <span class="progress-text" id="progress-text">1/20</span>
        </div>
      </header>

      <main class="question-card" id="question-card">
        <h2 class="question-text" id="question-text"></h2>
        <div class="options-grid" id="options-grid"></div>
      </main>

      <footer class="test-footer">
        <button class="prev-btn" id="prev-btn" style="visibility: hidden;">上一题</button>
        <button class="next-btn" id="next-btn" disabled>下一题</button>
      </footer>
    </div>
  </div>

  <script type="module" src="src/scripts/test.js"></script>
</body>
</html>
