<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>恋爱脑测试 - 开始测试</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
  <link rel="stylesheet" href="src/styles/main.css">
</head>
<body>
  <div class="test-page">
    <!-- 加载状态 -->
    <div id="loading-screen" class="loading-screen" role="status" aria-live="polite">
      <div class="loading-spinner" aria-hidden="true"></div>
      <p class="loading-text">正在验证...</p>
    </div>

    <!-- 错误状态 -->
    <div id="error-screen" class="error-screen" style="display: none;" role="alert" aria-live="assertive">
      <div class="error-icon" aria-hidden="true">⚠️</div>
      <h2 class="error-title">访问受限</h2>
      <p id="error-message" class="error-message"></p>
    </div>

    <!-- 测试主体 -->
    <div id="test-screen" class="test-screen" style="display: none;" role="main" aria-label="测试题目">
      <header class="test-header" role="banner">
        <div class="progress-container">
          <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="测试进度">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
          </div>
          <span class="progress-text" id="progress-text" aria-live="polite">1/20</span>
        </div>
      </header>

      <main class="question-card" id="question-card" role="region" aria-labelledby="question-text">
        <h2 class="question-text" id="question-text"></h2>
        <div class="options-grid" id="options-grid" role="radiogroup" aria-label="选项列表"></div>
      </main>

      <footer class="test-footer" role="contentinfo">
        <button class="prev-btn" id="prev-btn" style="visibility: hidden;" aria-label="上一题">上一题</button>
        <button class="next-btn" id="next-btn" disabled aria-label="下一题">下一题</button>
      </footer>
    </div>
  </div>

  <script type="module" src="src/scripts/test.js"></script>
  <script>
    // 调试信息（鸿蒙系统专用）
    function showDebugInfo() {
      const ua = navigator.userAgent;
      const isHarmonyOS = /HarmonyOS/.test(ua);
      const isWeChat = /micromessenger/i.test(ua);

      const debug = document.createElement('div');
      debug.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#000;color:#0f0;font:11px monospace;padding:8px;z-index:99999;line-height:1.4;';
      debug.innerHTML =
        '鸿蒙：<b style="color:'+(isHarmonyOS?'#f00:#0f0')+'">'+(isHarmonyOS?'是':'否')+'</b> | ' +
        '微信：<b style="color:'+(isWeChat?'#f00:#0f0')+'">'+(isWeChat?'是':'否')+'</b><br>' +
        'innerH: '+window.innerHeight+' | outerH: '+window.outerHeight+'<br>' +
        'body.style.height: '+getComputedStyle(document.body).height;
      document.body.appendChild(debug);
    }
    window.addEventListener('load', showDebugInfo);
  </script>
</body>
</html>
